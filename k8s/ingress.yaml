apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: etl-platform-ingress
  namespace: etl-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    nginx.ingress.kubernetes.io/rate-limit: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - etl-platform.example.com
      secretName: etl-platform-tls
  rules:
    - host: etl-platform.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: etl-platform-api
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: etl-platform-api
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: etl-platform-dashboard
                port:
                  number: 8501
