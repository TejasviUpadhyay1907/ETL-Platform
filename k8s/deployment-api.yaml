apiVersion: apps/v1
kind: Deployment
metadata:
  name: etl-platform-api
  namespace: etl-platform
  labels:
    app: etl-platform
    component: api
    version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etl-platform
      component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: etl-platform
        component: api
        version: "1.0.0"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: etl-platform-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      terminationGracePeriodSeconds: 60
      containers:
        - name: api
          image: etl-platform-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: etl-platform-config
          env:
            - name: DATABASE_URL
              value: "postgresql+psycopg2://$(DB_USER):$(DB_PASSWORD)@etl-postgres:5432/$(DB_NAME)"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: etl-platform-secrets
                  key: SECRET_KEY
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: etl-platform-secrets
                  key: JWT_SECRET
            - name: API_KEY_SALT
              valueFrom:
                secretKeyRef:
                  name: etl-platform-secrets
                  key: API_KEY_SALT
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: etl-platform-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: etl-platform-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: etl-platform-secrets
                  key: DB_NAME
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /api/v1/health/live
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health/ready
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/v1/health/ping
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: app-logs
              mountPath: /app/logs
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: etl-platform-data-pvc
        - name: app-logs
          emptyDir: {}
