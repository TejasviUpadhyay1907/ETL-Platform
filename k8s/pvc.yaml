apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etl-platform-data-pvc
  namespace: etl-platform
  labels:
    app: etl-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: etl-platform-postgres-pvc
  namespace: etl-platform
  labels:
    app: etl-platform
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
