apiVersion: v1
kind: ConfigMap
metadata:
  name: etl-platform-config
  namespace: etl-platform
  labels:
    app: etl-platform
data:
  APP_ENV: "production"
  APP_NAME: "ETL Platform"
  APP_VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  LOG_JSON_FORMAT: "True"
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
  DB_POOL_TIMEOUT: "30"
  DB_POOL_RECYCLE: "3600"
  PIPELINE_MAX_CONCURRENT_RUNS: "5"
  PIPELINE_CHUNK_SIZE: "10000"
  RATE_LIMIT_ENABLED: "True"
  RATE_LIMIT_PER_MINUTE: "60"
  RATE_LIMIT_PER_HOUR: "1000"
  CORS_ENABLED: "True"
  MAX_UPLOAD_SIZE_MB: "500"
  ALLOWED_FILE_TYPES: "csv,xlsx,xls"
  QUALITY_SCORE_WARNING_THRESHOLD: "80"
  QUALITY_SCORE_FAILURE_THRESHOLD: "50"
