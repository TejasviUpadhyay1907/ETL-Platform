dataset_type: payments
version: "1.0"
derived_fields:
  - name: days_to_payment
    expression: "days_between(invoice_date, payment_date)"
    description: "Number of days between invoice date and payment date"
  - name: payment_year
    expression: "year(payment_date)"
  - name: payment_month
    expression: "month(payment_date)"
field_mappings:
  payment_id: payment_id
  order_id: order_id
  amount: payment_amount
  payment_method: payment_method
  payment_date: payment_date
  invoice_date: invoice_date
  transaction_status: transaction_status
  currency: currency_code
