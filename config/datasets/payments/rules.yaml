dataset_type: payments
version: "1.0"
rules:
  - rule_code: PAY_001
    field: payment_id
    description: "payment_id must not be null"
    check: not_null
    severity: error
  - rule_code: PAY_002
    field: order_id
    description: "order_id must not be null"
    check: not_null
    severity: error
  - rule_code: PAY_003
    field: amount
    description: "amount must be greater than zero"
    check: greater_than
    value: 0
    severity: error
  - rule_code: PAY_004
    field: payment_method
    description: "payment_method must be in allowed list"
    check: in_list
    values: [credit_card, debit_card, bank_transfer, cash, cheque, paypal, stripe]
    severity: error
  - rule_code: PAY_005
    field: payment_date
    description: "payment_date must be a valid date"
    check: valid_date
    severity: error
  - rule_code: PAY_006
    field: transaction_status
    description: "transaction_status must be in allowed list"
    check: in_list
    values: [completed, pending, failed, refunded, cancelled]
    severity: error
