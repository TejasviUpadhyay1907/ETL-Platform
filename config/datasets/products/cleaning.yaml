dataset_type: products
version: "1.0"
field_strategies:
  product_id:
    null_strategy: drop_row
    trim: true
    string_case: upper
  product_name:
    null_strategy: drop_row
    string_case: title
    trim: true
  category:
    null_strategy: drop_row
    string_case: title
    trim: true
  price:
    null_strategy: drop_row
    strip_currency: true
  cost:
    null_strategy: fill_default
    default_value: 0
    strip_currency: true
  sku:
    null_strategy: flag
    trim: true
  brand:
    null_strategy: fill_default
    default_value: UNKNOWN
    string_case: title
    trim: true
  is_active:
    null_strategy: fill_default
    default_value: true
