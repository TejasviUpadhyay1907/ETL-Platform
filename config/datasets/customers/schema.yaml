# Customers dataset schema definition
dataset_type: customers
version: "1.0"

columns:
  - name: customer_id
    type: string
    required: true
  - name: first_name
    type: string
    required: true
  - name: last_name
    type: string
    required: true
  - name: email
    type: string
    required: true
  - name: phone
    type: string
    required: false
  - name: country
    type: string
    required: false
  - name: city
    type: string
    required: false
  - name: created_date
    type: date
    required: false
  - name: customer_segment
    type: string
    required: false

deduplication_key: [customer_id]
