# =============================================================================
# Pre-commit Hook Configuration
# =============================================================================
# Runs automatically before every `git commit`.
# Install: pre-commit install
# Run manually: pre-commit run --all-files
# Update hooks: pre-commit autoupdate
# =============================================================================

repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace        # Remove trailing whitespace
      - id: end-of-file-fixer          # Ensure files end with newline
      - id: check-yaml                  # Validate YAML syntax
      - id: check-toml                  # Validate TOML syntax
      - id: check-json                  # Validate JSON syntax
      - id: check-added-large-files     # Prevent committing large files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict        # Detect unresolved merge conflicts
      - id: check-case-conflict         # Detect case-insensitive file name conflicts
      - id: detect-private-key          # Block accidental private key commits
      - id: no-commit-to-branch         # Block direct commits to main/master
        args: ["--branch", "main", "--branch", "master"]
      - id: debug-statements            # Detect leftover debug statements

  # ---------------------------------------------------------------------------
  # Python code formatting with Black
  # ---------------------------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3.12
        args: ["--line-length=100"]

  # ---------------------------------------------------------------------------
  # Python linting and formatting with Ruff
  # (replaces flake8 + isort + pyupgrade)
  # ---------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.5
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # ---------------------------------------------------------------------------
  # Static type checking with mypy
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies:
          - types-pyyaml
          - types-passlib
          - pydantic
          - pydantic-settings
        args: ["--ignore-missing-imports", "--no-strict-optional"]
        exclude: ^(migrations|tests)/

  # ---------------------------------------------------------------------------
  # Security scanning with bandit
  # ---------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: ["-c", "pyproject.toml", "-r", "app/"]
        exclude: ^tests/

  # ---------------------------------------------------------------------------
  # YAML formatting
  # ---------------------------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-d", "{extends: relaxed, rules: {line-length: {max: 120}}}"]
        exclude: ^(docker/|.github/)
