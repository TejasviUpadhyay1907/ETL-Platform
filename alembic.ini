# Alembic configuration file for ETL Platform
# See https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration file names
# Includes timestamp prefix for chronological ordering
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of slug in generated filename
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# even if a revision file already exists for the requested rev id.
# revisit_revision_on_conflict = false

# Version location specification
version_locations = %(here)s/migrations/versions

# The output encoding used when revision files are written from
# script.py.mako
output_encoding = utf-8

# Database URL — overridden by env.py which reads from AppConfig
# This is a fallback for tools that read alembic.ini directly
sqlalchemy.url = postgresql+psycopg2://etl_user:etl_password@localhost:5432/etl_platform

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.  See the documentation for further
# detail and examples

# format using "black" - use the console_scripts runner, against the "black" entrypoint
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
