# =============================================================================
# Enterprise ETL Platform — CI/CD Pipeline v1.0.0
# =============================================================================
# Jobs:
#   lint        — Black, Ruff code quality
#   typecheck   — mypy static analysis
#   test        — pytest + coverage + dashboard tests
#   security    — pip-audit dependency vulnerability scan
#   docker      — multi-platform image build verification
#   release     — tag-triggered GitHub Release + SBOM
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: "3.12"
  APP_ENV: development
  DATABASE_URL: postgresql+psycopg2://etl_user:etl_password@localhost:5432/etl_platform_test
  SECRET_KEY: ci-test-secret-key-for-github-actions-only-32ch
  JWT_SECRET: ci-test-jwt-secret-for-github-actions-only-32ch
  API_KEY_SALT: ci-test-api-key-salt-16c
  LOG_LEVEL: WARNING
  LOG_JSON_FORMAT: "False"
  PIPELINE_ENABLE_SCHEDULER: "False"

# ---------------------------------------------------------------------------
# Job 1: Lint & Format
# ---------------------------------------------------------------------------
jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install black==24.10.0 ruff==0.8.5

      - name: Black format check
        run: black --check --line-length=100 app/ tests/ scripts/ dashboard/

      - name: Ruff lint
        run: ruff check app/ tests/ scripts/ dashboard/ --output-format=github

  # ---------------------------------------------------------------------------
  # Job 2: Static Type Check
  # ---------------------------------------------------------------------------
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt mypy==1.14.0 types-pyyaml types-passlib

      - name: mypy
        run: mypy app/ --ignore-missing-imports --no-strict-optional --exclude migrations/
        continue-on-error: true   # Advisory — does not block merge

  # ---------------------------------------------------------------------------
  # Job 3: Tests + Coverage
  # ---------------------------------------------------------------------------
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        python-version: ["3.12"]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: etl_user
          POSTGRES_PASSWORD: etl_password
          POSTGRES_DB: etl_platform_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Create required directories
        run: mkdir -p data/raw data/reports data/archive logs

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            -q --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-fail-under=78 \
            --strict-markers

      - name: Run integration tests
        run: |
          pytest tests/integration/test_api_health.py \
            -q --tb=short --strict-markers

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: coverage_html/
          retention-days: 14

      - name: Coverage summary
        run: |
          echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
          python -m coverage report --format=markdown >> $GITHUB_STEP_SUMMARY 2>/dev/null || true

  # ---------------------------------------------------------------------------
  # Job 4: Security Audit
  # ---------------------------------------------------------------------------
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit==2.8.0

      - name: Audit production dependencies
        run: |
          pip install -r requirements.txt
          pip-audit --desc --format=markdown 2>&1 | tee pip_audit_report.md || true
          echo "## Dependency Audit" >> $GITHUB_STEP_SUMMARY
          cat pip_audit_report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: pip_audit_report.md
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: pip-audit --fail-on-cvss 9.0 -r requirements.txt || echo "⚠️ Advisory: review audit report"

  # ---------------------------------------------------------------------------
  # Job 5: Docker Build
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop' ||
      startsWith(github.ref, 'refs/tags/v') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: false
          tags: |
            etl-platform-api:${{ github.sha }}
            etl-platform-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}

      - name: Build Dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.dashboard
          push: false
          tags: |
            etl-platform-dashboard:${{ github.sha }}
            etl-platform-dashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (API image)
        uses: anchore/sbom-action@v0
        with:
          image: etl-platform-api:${{ github.sha }}
          artifact-name: sbom-api-${{ github.sha }}.spdx
          output-file: sbom-api.spdx
        continue-on-error: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom-api.spdx
          retention-days: 90
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Job 6: Release (tag-triggered only)
  # ---------------------------------------------------------------------------
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test, security, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          echo "Extracting changelog for ${VERSION}..."
          python - <<'EOF'
          import re, sys
          try:
              content = open("CHANGELOG.md").read()
              version = "${{ github.ref_name }}"
              pattern = rf"## \[{re.escape(version)}\].*?(?=\n## |\Z)"
              match = re.search(pattern, content, re.DOTALL)
              if match:
                  print(match.group(0).strip())
              else:
                  print(f"Release {version}")
          except FileNotFoundError:
              print(f"Release {version}")
          EOF

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ETL Platform ${{ github.ref_name }}"
          body: |
            ## Enterprise ETL & Data Quality Platform — ${{ github.ref_name }}

            ### What's Included
            - Complete ETL pipeline (Ingestion → Validation → Cleaning → Transformation → Loading)
            - JWT + RBAC security layer
            - Streamlit operations dashboard
            - Prometheus + Grafana observability
            - Kubernetes-ready manifests
            - 1148+ passing tests, 79%+ coverage

            See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          files: |
            sbom-*/sbom-api.spdx
            pip-audit-report/pip_audit_report.md
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') }}
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Summary gate
  # ---------------------------------------------------------------------------
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          LINT="${{ needs.lint.result }}"
          TEST="${{ needs.test.result }}"
          SEC="${{ needs.security.result }}"
          echo "lint=$LINT  test=$TEST  security=$SEC"
          if [[ "$LINT" == "failure" || "$TEST" == "failure" ]]; then
            echo "❌ Required CI jobs failed."
            exit 1
          fi
          echo "✅ All required CI jobs passed."
