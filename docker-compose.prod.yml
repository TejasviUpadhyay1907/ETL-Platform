# =============================================================================
# Enterprise ETL Platform — Production Docker Compose v1.0.0
# =============================================================================
# Full production stack: API + DB + Nginx + Dashboard + Redis
# Usage: docker-compose -f docker-compose.prod.yml up -d
# =============================================================================

version: "3.9"

x-common-env: &common-env
  APP_ENV: production
  LOG_JSON_FORMAT: "True"
  LOG_LEVEL: INFO

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — Primary database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    container_name: etl_prod_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-etl_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      POSTGRES_DB: ${DB_NAME:-etl_platform}
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-etl_user} -d ${DB_NAME:-etl_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # FastAPI Application — Production (4 workers)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    image: etl-platform-api:${VERSION:-1.0.0}
    container_name: etl_prod_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      <<: *common-env
      DATABASE_URL: postgresql+psycopg2://${DB_USER:-etl_user}:${DB_PASSWORD}@db:5432/${DB_NAME:-etl_platform}
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "20"
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health/ping', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - backend
      - frontend
    deploy:
      replicas: 1
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    image: etl-platform-dashboard:${VERSION:-1.0.0}
    container_name: etl_prod_dashboard
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      DASHBOARD_API_URL: http://api:8000
      DASHBOARD_API_TIMEOUT: "15"
    expose:
      - "8501"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: etl_prod_nginx
    restart: always
    depends_on:
      - api
      - dashboard
    volumes:
      - ./docker/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - ./app/static:/app/static:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - frontend
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
    name: etl_prod_postgres_data
  app_data:
    driver: local
    name: etl_prod_app_data
  app_logs:
    driver: local
    name: etl_prod_app_logs

networks:
  backend:
    driver: bridge
    name: etl_prod_backend
    internal: true
  frontend:
    driver: bridge
    name: etl_prod_frontend
