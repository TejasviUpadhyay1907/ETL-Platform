# =============================================================================
# Nginx Reverse Proxy Configuration for ETL Platform
# =============================================================================
# Responsibilities:
#   - Reverse proxy to FastAPI application
#   - Static file serving
#   - Request buffering
#   - Basic rate limiting at proxy level
#   - Security headers (supplementary to application-level headers)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log format with request ID for correlation
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time '
                    'rid=$http_x_request_id';

    access_log /var/log/nginx/access.log main;

    # Performance settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 512M;  # Must match MAX_UPLOAD_SIZE_MB

    # Gzip compression (nginx-level, in addition to app-level)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss;

    # Rate limiting zones
    # Adjust limits based on production traffic patterns
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=10r/m;

    # Upstream FastAPI application
    upstream etl_app {
        server app:8000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS in production
        # Uncomment when TLS is configured:
        # return 301 https://$server_name$request_uri;

        # --- Static files (served directly by nginx, not proxied) ----------
        location /static/ {
            alias /app/static/;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # --- File download endpoint (increased timeout for large files) ----
        location /api/v1/reports/download/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://etl_app;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            include /etc/nginx/proxy_params;
        }

        # --- File upload endpoint (stricter rate limiting) -----------------
        location /api/v1/ingest/upload {
            limit_req zone=upload burst=5 nodelay;
            proxy_pass http://etl_app;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            client_max_body_size 512M;
            include /etc/nginx/proxy_params;
        }

        # --- Health checks (no rate limiting) ------------------------------
        location /api/v1/health {
            proxy_pass http://etl_app;
            include /etc/nginx/proxy_params;
        }

        # --- All other API endpoints ---------------------------------------
        location /api/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass http://etl_app;
            include /etc/nginx/proxy_params;
        }

        # --- Dashboard (HTML) ----------------------------------------------
        location / {
            proxy_pass http://etl_app;
            include /etc/nginx/proxy_params;
        }

        # --- Block common attack paths -------------------------------------
        location ~ /\. {
            deny all;
        }

        location ~ \.(env|git|yaml|yml|toml|cfg)$ {
            deny all;
        }
    }
}
